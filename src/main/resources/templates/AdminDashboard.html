<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>

        body{
            background:#f4f6f9;
        }

        .dashboard-header{
            background:linear-gradient(135deg,#4e73df,#224abe);
            color:white;
            padding:25px;
            border-radius:10px;
            margin-bottom:25px;
        }

        .member-card{
            border:none;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .table-hover tbody tr:hover{
            background:#f1f5ff;
            transition:0.2s;
        }

        .search-box{
            max-width:300px;
        }

    </style>
</head>

<body class="container mt-5">

<!-- Header -->
<div class="dashboard-header d-flex justify-content-between align-items-center">

    <div>
        <h2>Admin Dashboard</h2>
        <p class="mb-0">Manage all registered members</p>
    </div>

    <div class="d-flex align-items-center gap-3">

        <span class="badge bg-light text-dark fs-6">
            Members:
            <span th:text="${#lists.size(allMembers)}"></span>
        </span>

        <a href="/logout" class="btn btn-danger btn-sm">
            Logout
        </a>

    </div>

</div>


<div class="card member-card">

    <div class="card-body">

        <div class="d-flex justify-content-between mb-3">

            <h4 class="mb-0">All Registered Members</h4>

            <input
                    type="text"
                    id="searchInput"
                    class="form-control search-box"
                    placeholder="Search member...">

        </div>


        <table class="table table-hover table-bordered align-middle">

            <thead class="table-dark">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Email</th>
                <th width="180">Action</th>
            </tr>
            </thead>

            <tbody id="memberTable">

            <tr th:each="m : ${allMembers}" th:id="${m.id}">

                <td th:text="${m.id}"></td>
                <td th:text="${m.name}"></td>
                <td th:text="${m.email}"></td>

                <td>

                    <a class="btn btn-sm btn-primary"
                       th:href="@{/admin/members/profile/{id}(id=${m.id})}">
                        View
                    </a>

                    <button class="btn btn-sm btn-danger delete-btn"
                            th:data-id="${m.id}">
                        Delete
                    </button>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>


<script>

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function(){

        const filter = searchInput.value.toLowerCase();

        const rows = document.querySelectorAll("#memberTable tr");

        rows.forEach(row => {

            const name = row.children[1].innerText.toLowerCase();
            const email = row.children[2].innerText.toLowerCase();

            if(name.includes(filter) || email.includes(filter)){
                row.style.display="";
            }else{
                row.style.display="none";
            }

        });

    });



    document.querySelectorAll(".delete-btn").forEach(btn => {

        btn.addEventListener("click", async function(){

            const id = this.dataset.id;

            if(!confirm("Are you sure you want to delete this member?")){
                return;
            }

            const response = await fetch("/admin/members/" + id,{
                method:"DELETE"
            });

            if(response.ok){
                location.reload();
            }else{
                alert("Failed to delete member");
            }

        });

    });


</script>

</body>
</html>
