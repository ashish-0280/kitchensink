<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        body{
            background:#f4f6f9;
        }

        .dashboard-header{
            background:linear-gradient(135deg,#4e73df,#224abe);
            color:white;
            padding:25px;
            border-radius:10px;
            margin-bottom:25px;
        }

        .member-card{
            border:none;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .table-hover tbody tr:hover{
            background:#f1f5ff;
            transition:0.2s;
        }

        .search-box{
            max-width:300px;
        }

    </style>
</head>

<body class="container mt-5">

<!-- Header -->
<div class="dashboard-header d-flex justify-content-between align-items-center">

    <div>
        <h2>Admin Dashboard</h2>
        <p class="mb-0">Manage all registered members</p>
    </div>

    <div class="d-flex align-items-center gap-3">

        <span class="badge bg-light text-dark fs-6">
            Members:
            <span th:text="${totalMembers}"></span>
        </span>

        <a href="/logout" class="btn btn-danger btn-sm">
            Logout
        </a>

    </div>

</div>

<!-- CREATE MEMBER -->
<div class="card member-card">
    <div class="card-body">
        <h4 class="mb-3">Create Member</h4>

        <form id="member-creation" class="row">

            <div class="col-md-2 mb-2">
                <input type="text" name="name" class="form-control" placeholder="Name" required>
            </div>

            <div class="col-md-2 mb-2">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="col-md-2 mb-2">
                <input type="text" name="phone" class="form-control" placeholder="Phone No." required>
            </div>

            <div class="col-md-2 mb-2">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <div class="col-md-2 mb-2">
                <select name="role" class="form-control">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <div class="col-md-2 mb-2">
                <button type="submit" class="btn btn-success w-100">
                    Create
                </button>
            </div>

        </form>
    </div>
</div>


<!-- MEMBERS TABLE -->
<div class="card member-card">

    <div class="card-body">

        <div class="d-flex justify-content-between mb-3">

            <h4 class="mb-0">All Registered Members</h4>

            <form method="get" action="/admin/members" class="d-flex">

                <input
                        type="text"
                        name="keyword"
                        id="searchInput"
                        class="form-control search-box"
                        placeholder="Search member...">

                <button class="btn btn-primary ms-2">
                    Search
                </button>

            </form>

        </div>


        <table class="table table-hover table-bordered align-middle">

            <thead class="table-dark">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Email</th>
                <th width="180">Action</th>
            </tr>
            </thead>

            <tbody id="memberTable">

            <tr th:each="m : ${allMembers}" th:id="${m.id}">

                <td th:text="${m.id}"></td>
                <td th:text="${m.name}"></td>
                <td th:text="${m.email}"></td>

                <td>

                    <a class="btn btn-sm btn-primary"
                       th:href="@{/admin/members/profile/{id}(id=${m.id})}">
                        View
                    </a>

                    <button class="btn btn-sm btn-danger delete-btn"
                            th:data-id="${m.id}">
                        Delete
                    </button>

                </td>

            </tr>

            </tbody>

        </table>


        <!-- Pagination -->
        <div class="mt-4 text-center">

            <a th:if="${currentPage > 0}"
               th:href="@{/admin/members(page=${currentPage-1},keyword=${keyword})}"
               class="btn btn-outline-primary btn-sm">
                Previous
            </a>

            <span class="mx-2">
                Page [[${currentPage+1}]] of [[${totalPages}]]
            </span>

            <a th:if="${currentPage < totalPages-1}"
               th:href="@{/admin/members(page=${currentPage+1},keyword=${keyword})}"
               class="btn btn-outline-primary btn-sm">
                Next
            </a>

        </div>

    </div>

</div>


<script>

    /* DELETE MEMBER */

    document.addEventListener("click", async function(e){

        if(e.target.classList.contains("delete-btn")){

            const id = e.target.dataset.id;

            const confirm = await Swal.fire({
                title: "Delete Member?",
                text: "This action cannot be undone",
                icon: "warning",
                showCancelButton: true
            });

            if(!confirm.isConfirmed) return;

            const response = await fetch("/admin/members/" + id,{
                method:"DELETE"
            });

            if(response.ok){

                Swal.fire({
                    icon:"success",
                    title:"Member Deleted",
                    timer:1000,
                    showConfirmButton:false
                }).then(()=>{
                    location.reload();
                });

            }else{

                Swal.fire({
                    icon:"error",
                    title:"Delete Failed"
                });

            }

        }

    });


    /* SEARCH */

    const searchInput = document.getElementById("searchInput");
    const tableBody = document.getElementById("memberTable");

    let timer;

    searchInput.addEventListener("keyup", function(){

        clearTimeout(timer);

        timer = setTimeout(async () => {

            const keyword = searchInput.value;

            const response = await fetch(`/admin/members/search?keyword=${keyword}`);

            const data = await response.json();

            tableBody.innerHTML = "";

            data.content.forEach(member => {

                const row = `
                    <tr>
                        <td>${member.id}</td>
                        <td>${member.name}</td>
                        <td>${member.email}</td>
                        <td>
                            <a class="btn btn-sm btn-primary"
                               href="/admin/members/profile/${member.id}">
                               View
                            </a>

                            <button class="btn btn-sm btn-danger delete-btn"
                                    data-id="${member.id}">
                                    Delete
                            </button>
                        </td>
                    </tr>
                `;

                tableBody.innerHTML += row;

            });

        },300);

    });


    /* CREATE MEMBER */

    document.getElementById("member-creation").addEventListener("submit", async function(e){

        e.preventDefault();

        const name = document.querySelector("[name=name]").value;
        const email = document.querySelector("[name=email]").value;
        const phone = document.querySelector("[name=phone]").value;
        const password = document.querySelector("[name=password]").value;
        const role = document.querySelector("[name=role]").value;

        const response = await fetch("/admin/members/create",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({name,email,phone,password,role})
        });

        let data = {};

        try{
            data = await response.json();
        }catch(e){}

        if(response.ok){

            Swal.fire({
                icon:"success",
                title:"Member Created Successfully!",
                text:"Redirecting to Dashboard...",
                timer:1200,
                showConfirmButton:false
            }).then(()=>{
                window.location="/admin/members";
            });

        }else{

            Swal.fire({
                icon:"error",
                title:data.error || "Error",
                text:data.message || "Something went wrong"
            });

        }

    });

</script>

</body>
</html>
