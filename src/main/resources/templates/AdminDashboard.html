<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Member Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>THIS IS ADMIN DASHBOARD</h1>
    <div class="container mt-4">
    <h3>Admin Panel - Add New Member</h3>

    <div class="card p-4 mb-5 shadow-sm">
        <form th:action="@{/admin/add-member}" th:object="${memberRequest}" method="post">
            <div class="row">
                <div class="col-md-4">
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Full Name" required>
                </div>
                <div class="col-md-4">
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Email Address" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Add Member</button>
                </div>
            </div>
        </form>
    </div>

    <h4>All Registered Members</h4>
    <table class="table table-bordered mt-3">
        <thead class="table-light">
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Email</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${allMembers}">
            <td th:text="${m.id}"></td>
            <td th:text="${m.name}"></td>
            <td th:text="${m.email}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
