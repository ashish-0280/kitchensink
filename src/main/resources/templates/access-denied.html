<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Access Denied</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>

    body{
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:white;
        text-align:center;
    }

    .card{
        padding:40px;
        border-radius:15px;
        background:white;
        color:black;
        width:400px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .error-code{
        font-size:60px;
        font-weight:bold;
        color:#dc3545;
    }

  </style>

</head>

<body>

<div class="card">

  <div class="error-code">403</div>

  <h3>Access Denied</h3>

  <p>
    Sorry, you don't have permission to access this page.
  </p>

  <a href="/kitchensink" class="btn btn-primary mt-3">
    Go to Dashboard
  </a>

</div>

</body>
</html>
