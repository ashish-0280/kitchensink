<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center vh-100 bg-light">

<div class="container border p-4 bg-white shadow-sm" style="max-width: 400px;">
    <h3 class="text-center">Login</h3>
    <form th:action="@{/auth/login}" method="post" th:object="${user}">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control"
                   type="email"
                   th:field="*{email}"
                   placeholder="Enter your email">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control"
                   type="password"
                   th:field="*{password}"
                   placeholder="Enter password">
        </div>
        <button class="btn btn-primary w-100">Sign In</button>
    </form>
    <p class="mt-3 text-center">
        New here? <a th:href="@{/auth/signup}">Create an account</a>
    </p>
</div>
</body>
</html>
