<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center vh-100 bg-light">

<div class="container border p-4 bg-white shadow-sm" style="max-width: 400px;">
    <h3 class="text-center">Login</h3>
    <form th:action="@{/auth/login}" method="post" th:object="${user}">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control"
                   type="email"
                   th:field="*{email}"
                   placeholder="Enter your email">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control"
                   type="password"
                   th:field="*{password}"
                   placeholder="Enter password">
        </div>
        <button class="btn btn-primary w-100">Sign In</button>
    </form>
    <p class="mt-3 text-center">
        New here? <a th:href="@{/auth/signup}">Create an account</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

    document.querySelector("form").addEventListener("submit", async function(e){

        e.preventDefault();

        const email = document.querySelector("[name=email]").value;
        const password = document.querySelector("[name=password]").value;

        const response = await fetch("/auth/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({email,password})
        });

        const data = await response.json();

        if(response.ok){

            Swal.fire({
                icon: "success",
                title: "Login Successful",
                text: "Redirecting...",
                timer: 1000,
                showConfirmButton: false
            }).then(() => {

                if(data.role === "ADMIN"){
                    window.location="/admin/members";
                }else{
                    window.location="/member/profile";
                }

            });

        }else{

            Swal.fire({
                icon:"error",
                title:data.error,
                text:data.message
            });

        }

    });

</script>
</body>
</html>
