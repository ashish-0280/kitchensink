<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Member-Profile</title>
</head>
<body>

    <div>
        <h1>Your Profile</h1>
        <h3>Id:<strong th:text="${user.id}"></strong> </h3>
        <h3>Name: <strong th:text="${user.name}"></strong> </h3>
        <h3>Email: <strong th:text="${user.email}"></strong> </h3>
        <h3>Phone: <strong th:text="${user.phone}"></strong> </h3>
        <h3>Role: <strong th:text="${user.role}"></strong> </h3>
    </div>

</body>
</html>
