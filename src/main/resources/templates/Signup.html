<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center vh-100 bg-light">
<div class="container border p-4 bg-white shadow-sm" style="max-width: 400px;">
    <form th:action="@{/auth/signup}" th:object="${signupRequest}" method="post">
    <div class="mb-3">
        <label>Full Name</label>
        <input type="text" th:field="*{name}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" th:field="*{email}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Phone Number</label>
        <input type="tel" th:field="*{phone}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input type="password" th:field="*{password}" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success w-100">Register</button>
    <a th:href="@{/login}" class="d-block text-center mt-2">Back to Login</a>
</form>
</div>
</body>
</html>
